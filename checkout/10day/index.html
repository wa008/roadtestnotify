<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=AW-18125969897"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'AW-18125969897');
    </script>

    <title>Complete 10-Day Plan Checkout | Road Test Notification</title>
    <meta name="description" content="Confirm your 10-Day Road Test Notification plan and complete payment.">
    <meta name="robots" content="noindex, follow">
    <link rel="canonical" href="https://www.roadtestnotify.ca/checkout/10day/">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <meta name="theme-color" content="#0066cc">

    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/shared/topbar.css">
    <link rel="stylesheet" href="/shared/footer.css">
    <link rel="stylesheet" href="/checkout/checkout.css">
    <script src="https://js.stripe.com/v3/"></script>
</head>
<body data-plan="10day">
    <!-- Topbar Placeholder -->
    <div id="topbar-placeholder"></div>
    <script src="/shared/topbar-loader.js"></script>

    <header>
        <h1>10-Day Plan &middot; $5</h1>
    </header>

    <div class="container">
        <div class="content-section">
            <a href="/subscribe/" class="back-link">&larr; Back to plans</a>

            <div class="consent-block" id="sms-consent">
                <label class="consent-label">
                    <input type="checkbox" id="smsConsent" class="consent-checkbox">
                    <span class="consent-text">
                        I agree to receive road test cancellation SMS alerts from Road Test Notification SMS alerts.
                        Msg frequency varies. Msg &amp; data rates may apply.
                        Reply HELP for help, STOP to cancel.
                        See <a href="/privacy/">Privacy Policy</a> and <a href="/terms/">Terms</a>.
                    </span>
                </label>
            </div>

            <div class="checkout-wrap" id="checkoutWrap">
                <div id="checkout" class="checkout-mount"></div>
                <div class="checkout-loading" id="checkoutLoading">Loading payment form&hellip;</div>
            </div>
            <div class="checkout-error" id="checkoutError">
                <p class="error-text" id="checkoutErrorText"></p>
                <div class="error-actions">
                    <button type="button" class="error-btn-primary" id="errorRetry">Try again</button>
                    <span class="error-email-label">or email us:</span>
                    <span class="error-email" id="errorEmail" role="button" tabindex="0" title="Click to copy">roadtestnotifications@gmail.com</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <script src="/shared/footer-loader.js"></script>
    <script src="/checkout/checkout.js"></script>
</body>
</html>
